name: Build Python package

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest

  build:
    name: Build wheel and sdist
    runs-on: windows-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build native backend DLL
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build.ps1 -OutputDir .\src\pktmon_interface

      - name: Build package distributions
        run: python -m build

      - name: Smoke test built wheel
        shell: pwsh
        run: |
          $wheel = Get-ChildItem .\dist -Filter *.whl | Select-Object -First 1
          python -m pip install --force-reinstall $wheel.FullName
          pktmon-interface --help

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pktmon-interface-dist
          path: dist/*

  github-release:
    name: Attach distributions to GitHub release
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: pktmon-interface-dist
          path: dist

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-pypi:
    name: Publish distributions to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: pktmon-interface-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
